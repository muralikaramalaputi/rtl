<!DOCTYPE html>
<html>

<head>

    <title>AI RTL Generator</title>

    <style>

        body{
            font-family:Arial,Helvetica,sans-serif;
            background:#f5f7fb;
            margin:0;
            padding:40px;
        }

        .container{

            max-width:1000px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,.1);

        }

        h1{

            color:#1e3a8a;

        }

        textarea{

            width:100%;
            height:250px;
            padding:15px;
            font-size:16px;
            margin-top:10px;

        }

        input[type=file]{

            margin-top:15px;

        }

        button{

            margin-top:20px;
            padding:12px 30px;
            font-size:16px;
            cursor:pointer;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;

        }

        button:hover{

            background:#1d4ed8;

        }

        pre{

            background:#272822;
            color:#f8f8f2;
            padding:20px;
            overflow:auto;
            border-radius:8px;

        }

        .section{

            margin-top:40px;

        }

        .error{
            margin-top:20px;
            padding:12px;
            color:#991b1b;
            background:#fee2e2;
            border-radius:6px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>AI RTL Generator</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <h3>Paste RTL Specification</h3>

    <textarea
        name="specification"
        placeholder="Enter RTL Specification Here..."
    ></textarea>

    <h3>OR Upload Requirement File</h3>

    <input
        type="file"
        name="spec_file"
        accept=".txt,.pdf,.doc,.docx"
    >

    <br>

    <button type="submit">

        Generate RTL & Testbench

    </button>

</form>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if rtl %}

<div class="section">

<h2>Generated RTL</h2>

<pre>{{ rtl }}</pre>

<a href="{% url 'download_verilog' %}">
<button>

Download RTL (.v)

</button>
</a>

</div>

{% endif %}


{% if tb %}

<div class="section">

<h2>Generated Testbench</h2>

<pre>{{ tb }}</pre>

<a href="{% url 'download_tb' %}">
<button>

Download Testbench (.v)

</button>
</a>

</div>

{% endif %}

</div>

</body>

</html>
